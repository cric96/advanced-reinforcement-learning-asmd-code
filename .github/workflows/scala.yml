# separate terms of service, privacy policy, and support
# documentation.

name: Scala CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    ### For scala
    - uses: actions/checkout@v3
    - name: Set up JDK 25
      uses: actions/setup-java@v3
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'sbt'
    - name: Install native dependencies
      run: sudo apt-get update && sudo apt-get install -y libopenblas-dev libarpack2-dev
    - name: Run tests
      run: sbt test